name: Build e Release do Agente

on:
  push:
    branches: [main]
    paths:
      - 'agent/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            output: agent-windows.exe
            goos: windows
          - os: ubuntu-latest
            output: agent-linux
            goos: linux
          - os: macos-latest
            output: agent-mac
            goos: darwin
    runs-on: ${{ matrix.os }}
    steps:
      - name: Baixar o codigo
        uses: actions/checkout@v4

      - name: Configurar Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: agent/go.sum

      - name: Instalar dependencias do sistema (Linux, para GTK do systray)
        if: matrix.goos == 'linux'
        run: sudo apt-get update && sudo apt-get install -y gcc libgtk-3-dev libayatana-appindicator3-dev

      - name: Compilar (Windows, sem console)
        if: matrix.goos == 'windows'
        working-directory: ./agent
        shell: bash
        run: |
          go build -ldflags "-H=windowsgui -X main.relayAddr=${{ secrets.EC2_HOST }}:7000 -X main.sharedToken=${{ secrets.RELAY_SHARED_TOKEN }}" -o ${{ matrix.output }} main.go

      - name: Compilar (Linux/Mac)
        if: matrix.goos != 'windows'
        working-directory: ./agent
        shell: bash
        run: |
          go build -ldflags "-X main.relayAddr=${{ secrets.EC2_HOST }}:7000 -X main.sharedToken=${{ secrets.RELAY_SHARED_TOKEN }}" -o ${{ matrix.output }} main.go

      - name: Upload do artefato
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: agent/${{ matrix.output }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Baixar todos os artefatos
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publicar como Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          files: |
            artifacts/agent-windows.exe/agent-windows.exe
            artifacts/agent-linux/agent-linux
            artifacts/agent-mac/agent-mac